# OPR.0.3.3.13.2 - AC-3b expected affected-skills set for the v0.3.1->v0.3.2 release diff.
#
# Self-contained FROZEN snapshot so the lookup test is deterministic + portable
# (no dependency on the substrate skills-corpus path). `skills` is the v0.3.2-era
# metadata.cli_surfaces_referenced backfill across the 45 CLI-referencing canonical
# skills; `affected_skills` is the expected output of
# computeAffectedSkills(release-surface-diff.v0.3.1-v0.3.2.yaml, skills). The test
# recomputes from `skills` and asserts it equals `affected_skills` - so it proves
# BOTH zero false-negatives (all 11 affected present) AND zero false-positives (the
# other 34 absent). Regenerate when the v0.3.2 backfill changes.
