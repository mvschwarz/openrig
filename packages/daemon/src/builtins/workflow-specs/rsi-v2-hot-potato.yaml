# RSI v2 starter workflow_spec — Discovery → Product Lab → Delivery →
# Lifecycle → QA hot-potato loop.
#
# This is the canonical first workflow_spec OpenRig ships out-of-box. New
# rigs see it under `rig workflow specs`; operators instantiate it
# explicitly with `rig workflow instantiate <path-to-this-file>
# --root-objective "..."` (the existing PL-004 Phase D verb).
#
# Workspace-surface reconciliation: an operator who wants a custom flow
# can copy this file to a workspace path, edit it, and have the
# operator-authored version win at next read (Phase D's
# WorkflowSpecCache contract). The starter loader at startup will skip
# upserting when an entry for (name=rsi-v2-hot-potato, version=1) is
# already cached — operator edits are not clobbered.
#
# Schema follows packages/daemon/src/domain/workflow-types.ts. Notable:
#   - top-level `workflow:` key (parser requirement)
#   - `id` is the spec name; `version` is a string
#   - `objective` is the spec-level purpose (stored as workflow_specs.purpose)
#   - `roles` is a MAPPING (role-id → { skill_refs, preferred_targets })
#   - each step has `actor_role` (resolved against roles); routing hints
#     live in `next_hop.suggested_roles` (NOT in success/failure branch
#     fields — Phase D's runtime resolves the next owner via next_hop +
#     operator/explicit nextOwnerSession at project-time)
#   - `coordination_terminal_turn_rule: hot_potato` matches the team's
#     default operating model

workflow:
  id: rsi-v2-hot-potato
  version: "1"
  objective: |
    Canonical RSI v2 hot-potato loop — Discovery → Product Lab → Delivery →
    Lifecycle → QA. Each step's owner closes with a hot-potato terminal-turn
    reason (handoff to next-step owner, or done/waiting/failed); the workflow
    runtime atomically projects the next-step packet in the same daemon
    transaction (transactional-scribe). QA loops back to Discovery for
    follow-up signal, with `done` as the acceptable terminal when no
    follow-up surfaces.

  target:
    rig: openrig-velocity

  entry:
    role: discovery-router

  invariants:
    continuation_required: true
    allowed_exits: [handoff, waiting, done, failed]
    preserve_lineage: true
    closure_required: true

  loop_guards:
    # Conservative ceiling for a single trip around the loop. The team's
    # actual loops typically close in 5-10 hops; max_hops here protects
    # against runaway routing-table churn rather than constraining normal
    # operation.
    max_hops: 30

  coordination_terminal_turn_rule: hot_potato

  closure:
    success: |
      Slice shipped through the full loop: Discovery surfaced the candidate;
      Product Lab ratified; Delivery implemented and passed guard + QA;
      Lifecycle promoted to main with caveats preserved; QA confirmed
      runtime ship-readiness.
    degraded: |
      One or more steps closed with `waiting` (blocked on external input).
      The instance is recoverable — resume by closing the blocked step
      with the relevant evidence, or re-instantiate from the failed step.
    failed: |
      A step closed with `failed`. Inspect the trail; the failure reason
      is in the trail entry's closure_evidence. Operator owns next steps
      (re-route, re-instantiate, or close as no-follow-on).

  roles:
    discovery-router:
      skill_refs: [discovery, intake, candidate-routing]
      preferred_targets:
        - intake-router@openrig-velocity
        - discovery-router@openrig-velocity
    product-lab-planner:
      skill_refs: [planning, slice-authoring, prd-shaping]
      preferred_targets:
        - velocity-planner@openrig-velocity
        - planning-slice-writer@openrig-velocity
    delivery-driver:
      skill_refs: [implementation, driver, guard-review, qa-handoff]
      preferred_targets:
        - velocity-driver@openrig-velocity
    lifecycle-router:
      skill_refs: [source-promotion, caveat-preservation, bundling]
      preferred_targets:
        - lifecycle-router@openrig-velocity
        - orch-lead@openrig-velocity
    qa-tester:
      skill_refs: [dogfood, headed-browser, vm-verification, fix-and-retest]
      preferred_targets:
        - velocity-qa@openrig-velocity
        - velocity-tester@openrig-velocity

  steps:
    - id: discovery
      actor_role: discovery-router
      objective: |
        Surface and classify a candidate from raw signal; route the shaped
        candidate forward to Product Lab, OR close as no-op with rationale
        recorded in the closure_evidence.
      allowed_exits: [handoff, done, waiting, failed]
      next_hop:
        mode: prefer
        suggested_roles: [product-lab-planner]

    - id: product-lab
      actor_role: product-lab-planner
      objective: |
        Shape the candidate into a ratified slice packet (Implementation-PRD,
        or 3-file split per the founder's per-slice format directive). Orch
        ratifies via `rigx queue handoff`; operator holds open questions
        through this step rather than letting them block delivery.
      allowed_exits: [handoff, waiting, failed]
      next_hop:
        mode: prefer
        suggested_roles: [delivery-driver]

    - id: delivery
      actor_role: delivery-driver
      objective: |
        Implement the slice per packet on a clean worktree branch; close
        with single coherent commit; pass the guard checkpoint and the QA
        dogfood gate. Hand back to orch-lead with a comprehensive packet.
      allowed_exits: [handoff, waiting, failed]
      next_hop:
        mode: prefer
        suggested_roles: [lifecycle-router]

    - id: lifecycle
      actor_role: lifecycle-router
      objective: |
        Source-promote the shipped slice to main; preserve dogfood caveats
        verbatim; bundle for future review. Lifecycle is NOT a re-test
        gate — caveats from QA dogfood travel with the promotion.
      allowed_exits: [handoff, waiting, failed]
      next_hop:
        mode: prefer
        suggested_roles: [qa-tester]

    - id: qa
      actor_role: qa-tester
      objective: |
        Confirm runtime ship-readiness via dogfood (headed-browser for UI
        slices, VM verification for source-touching slices). QA owns the
        fix-and-retest cycle end-to-end; only escalate large/architectural
        blockers back to delivery. Close with `handoff` to discovery when
        follow-up signal exists; close with `done` when none does.
      allowed_exits: [handoff, done, waiting, failed]
      next_hop:
        # `prefer` (not `require`) — many slices close with `done` (no
        # follow-up signal) which Phase D treats as a terminal exit and
        # ignores the next_hop hint. The hint exists for the looping
        # case so projection routes correctly when QA hands back to
        # Discovery.
        mode: prefer
        suggested_roles: [discovery-router]
