name: pm
version: "1.0"
description: >
  Product Manager agent — owns the "what" and "why" for features.
  Runs the 8-step feature flow from idea capture through dev handoff.
  Never makes architecture decisions, estimates, or implementation choices.

defaults:
  runtime: claude-code

imports:
  - ref: "local:../../shared"

profiles:
  default:
    uses:
      skills:
        - openrig-user
        - office-hours
        - context-builder
        - requirements-writer
        - ui-mockup
        - plan-review
        - exec-summary
        - backlog-capture

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      delivery_hint: send_text
      required: true
  actions: []
