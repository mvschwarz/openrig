name: product-designer
version: "1.0"
description: Product designer — shapes UX, interaction flows, and design-system coherence

defaults:
  runtime: claude-code

imports:
  - ref: local:../../shared

profiles:
  default:
    uses:
      skills: [using-superpowers, openrig-user, development-team, frontend-design, verification-before-completion, writing-plans, brainstorming]
      guidance: []
      subagents: []
      runtime_resources: [shared:claude-default-settings, shared:claude-default-mcp, shared:codex-default-config]

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      delivery_hint: send_text
      required: true
  actions: []
