name: qa
version: "1.0"
description: QA agent — gates every edit with adversarial but cooperative review

defaults:
  runtime: codex

imports:
  - ref: local:../../shared

profiles:
  default:
    uses:
      skills: [using-superpowers, openrig-user, development-team, systematic-debugging, verification-before-completion, agent-browser, dogfood, writing-plans, executing-plans]
      guidance: []
      subagents: []
      hooks: []
      runtime_resources: []

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      delivery_hint: send_text
      required: true
  actions: []
