name: synthesizer
version: "1.0"
description: Research synthesizer — consolidates findings into actionable summaries

defaults:
  runtime: codex

imports:
  - ref: local:../../shared

profiles:
  default:
    uses:
      skills: [openrig-user]
      guidance: []
      subagents: []
      runtime_resources: [shared:claude-default-settings, shared:claude-default-mcp, shared:codex-default-config]

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      delivery_hint: send_text
      required: true
  actions: []
