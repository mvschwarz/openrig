version: "0.2"
name: kernel
summary: >
  Class-of-one always-on rig: advisor pilots user intent, operator runs
  OpenRig itself, queue worker classifies stream-to-queue substrate.
  Auto-boots on rig daemon start (V0.3.1 slice 05); subsequent host
  restarts auto-resume kernel via daemon-restart without re-running
  setup (OQ-B=L2). Dual-runtime variant; Claude Code + Codex both
  authenticated.

culture_file: culture/CULTURE.md

pods:
  - id: advisor
    label: Advisor
    members:
      - id: lead
        agent_ref: "local:agents/advisor/lead"
        runtime: claude-code
        profile: default
        cwd: "."

  - id: operator
    label: Operator
    members:
      - id: human
        # builtin:terminal marker — pure topology presence with zero
        # startup actions. Real human interaction routes through the
        # operator agent + the host shell.
        agent_ref: "builtin:terminal"
        runtime: terminal
        profile: none
        cwd: "."
      - id: agent
        agent_ref: "local:agents/operator/agent"
        runtime: codex
        profile: default
        cwd: "."
    edges:
      - kind: collaborates_with
        from: agent
        to: human
      - kind: escalates_to
        from: agent
        to: human

  - id: queue
    label: Queue
    members:
      - id: worker
        agent_ref: "local:agents/queue/worker"
        runtime: codex
        profile: default
        cwd: "."

edges:
  - kind: delegates_to
    from: advisor.lead
    to: operator.agent
  - kind: delegates_to
    from: advisor.lead
    to: queue.worker
  - kind: escalates_to
    from: queue.worker
    to: advisor.lead
